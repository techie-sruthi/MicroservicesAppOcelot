version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ProductServiceDb
    volumes:
      - mongodb_data:/data/db
    networks:
      - microservices-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Express"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - microservices-network

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  userservice:
    build:
      context: ./Services/UserService
      dockerfile: UserService.API/Dockerfile
    container_name: userservice
    restart: unless-stopped
    ports:
    - "5000:5100"

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=UserServiceDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - Jwt__Key=THIS_IS_MY_SUPER_SECRET_KEY_12345
      - Jwt__Issuer=UserService
      - Jwt__Audience=MicroserviceUsers
      - Jwt__ExpiryMinutes=60
    depends_on:
      - sqlserver
    networks:
      - microservices-network

  productservice:
    build:
      context: ./Services/ProductService
      dockerfile: ProductService.API/Dockerfile
    container_name: productservice
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=ProductServiceDb
      - FileStorage__Provider=MinIO
      - FileStorage__MinIO__Endpoint=minio:9000
      - FileStorage__MinIO__PublicEndpoint=localhost:9000
      - FileStorage__MinIO__AccessKey=minioadmin
      - FileStorage__MinIO__SecretKey=minioadmin
      - FileStorage__MinIO__BucketName=product-images
      - FileStorage__MinIO__UseSSL=false
      - Jwt__Key=THIS_IS_MY_SUPER_SECRET_KEY_12345
    depends_on:
      - mongodb
      - minio
    networks:
      - microservices-network

  apigateway:
    build:
      context: ./Services/ApiGateway
      dockerfile: ApiGateway/Dockerfile
    container_name: apigateway
    restart: unless-stopped
    ports:
      - "5200:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - OCELOT_CONFIG=ocelot.docker.json
      - Jwt__Key=THIS_IS_MY_SUPER_SECRET_KEY_12345
      - Jwt__Issuer=UserService
      - Jwt__Audience=MicroserviceUsers
      - Jwt__ExpiryMinutes=60
    depends_on:
      - userservice
      - productservice
    networks:
      - microservices-network

volumes:
  sqlserver_data:
    external: true
    name: microservicesapp_sqlserver_data

  mongodb_data:
    external: true
    name: microservicesapp_mongodb_data

  minio_data:
    external: true
    name: microservicesapp_minio_data


networks:
  microservices-network:
    driver: bridge
