<app-layout>
<p-toast class="custom-toast"></p-toast>

  <div class="change-password-container">
    <p-card header="Change Password" styleClass="password-card">

      <div class="form-content">
        <div class="field">
          <label for="currentPassword">Current Password <span class="required">*</span></label>
          <p-password
            id="currentPassword"
            [(ngModel)]="currentPassword"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="Enter current password"
            class="w-full"
            [disabled]="saving">
          </p-password>
        </div>

        <div class="field">
          <label for="newPassword">New Password <span class="required">*</span></label>
          <p-password
            id="newPassword"
            [(ngModel)]="newPassword"
            [feedback]="true"
            [toggleMask]="true"
            placeholder="Enter new password"
            class="w-full"
            [disabled]="saving">
          </p-password>
          <small class="hint">Minimum 6 characters required</small>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm New Password <span class="required">*</span></label>
          <p-password
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="Confirm new password"
            class="w-full"
            [disabled]="saving">
          </p-password>
        </div>

        <div class="button-group">
          <p-button
            [label]="saving ? 'Saving...' : 'Change Password'"
            [icon]="saving ? 'pi pi-spin pi-spinner' : 'pi pi-lock'"
            (onClick)="changePassword()"
            severity="success"
            [disabled]="saving">
          </p-button>

          <p-button
            label="Clear"
            icon="pi pi-times"
            (onClick)="resetForm()"
            severity="secondary"
            [disabled]="saving">
          </p-button>
        </div>
      </div>

    </p-card>
  </div>
</app-layout>
