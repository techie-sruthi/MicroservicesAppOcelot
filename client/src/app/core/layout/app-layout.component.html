<div class="layout">

  <!-- Mobile Hamburger Button -->
  <button class="hamburger-btn" (click)="toggleSidebar()" [class.active]="sidebarOpen" title="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" [class.mobile-open]="sidebarOpen">
    <!-- Close button for mobile -->
    <button class="close-sidebar-btn" (click)="closeSidebar()">
      <span>×</span>
    </button>

    <h2 class="logo">Product Serve</h2>

    <!-- Admin Navigation -->
    <ng-container *ngIf="isAdmin">
      <a routerLink="/admin/products" routerLinkActive="active" (click)="closeSidebar()">
        📦 All Products
      </a>

      <a routerLink="/admin/users" routerLinkActive="active" (click)="closeSidebar()">
        👥 Manage Users
      </a>
    </ng-container>

    <!-- User Navigation -->
    <ng-container *ngIf="!isAdmin">
      <a routerLink="/products" routerLinkActive="active" (click)="closeSidebar()">
        📦 My Products
      </a>
    </ng-container>

  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="welcome-text">
        Welcome
        <span class="role-badge">
          {{ isAdmin ? 'Admin' : 'User' }}
        </span> 👋
      </div>

      <div class="user-section">
        <button class="logout-btn" (click)="onLogout()">Logout</button>
      </div>
    </div>

    <!-- Page Content -->
    <div class="content">
      <ng-content></ng-content>
    </div>

  </div>
</div>
