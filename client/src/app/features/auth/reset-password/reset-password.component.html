<p-toast></p-toast>

<div class="auth-container">
  <p-card header="Reset Password">

    <!-- Invalid Token -->
    <div *ngIf="tokenInvalid" class="error-state">
      <div class="error-icon">
        <i class="pi pi-exclamation-circle"></i>
      </div>
      <h3>Invalid Reset Link</h3>
      <p>This password reset link is invalid or has expired.</p>
      <button pButton
              type="button"
              label="Request New Link"
              icon="pi pi-refresh"
              (click)="goToLogin()"
              class="w-full mt-3">
      </button>
    </div>

    <!-- Reset Form -->
    <div *ngIf="!tokenInvalid && !resetSuccess">
      <p class="subtitle">Enter your new password below.</p>

      <div class="field">
        <label for="newPassword">New Password</label>
        <p-password
          id="newPassword"
          [(ngModel)]="newPassword"
          [feedback]="true"
          [toggleMask]="true"
          placeholder="Enter new password"
          styleClass="w-full"
          [disabled]="loading">
        </p-password>
        <small class="hint">Minimum 6 characters</small>
      </div>

      <div class="field mt-3">
        <label for="confirmPassword">Confirm Password</label>
        <p-password
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Confirm new password"
          styleClass="w-full"
          [disabled]="loading">
        </p-password>
        <small class="p-error" *ngIf="confirmPassword && newPassword !== confirmPassword">
          Passwords do not match
        </small>
      </div>

      <button pButton
              type="button"
              [label]="loading ? 'Resetting...' : 'Reset Password'"
              [icon]="loading ? 'pi pi-spin pi-spinner' : 'pi pi-lock'"
              (click)="onSubmit()"
              [disabled]="loading || !newPassword || !confirmPassword || newPassword !== confirmPassword"
              class="w-full mt-3">
      </button>
    </div>

    <!-- Success State -->
    <div *ngIf="resetSuccess" class="success-state">
      <div class="success-icon">
        <i class="pi pi-check-circle"></i>
      </div>
      <h3>Password Reset Successful!</h3>
      <p>Your password has been changed. You can now login with your new password.</p>
      <button pButton
              type="button"
              label="Go to Login"
              icon="pi pi-sign-in"
              (click)="goToLogin()"
              class="w-full mt-3">
      </button>
    </div>

    <!-- Back to Login -->
    <div *ngIf="!resetSuccess" class="mt-4 text-center">
      <a routerLink="/login" class="back-link">
        <i class="pi pi-arrow-left"></i> Back to Login
      </a>
    </div>
  </p-card>
</div>
