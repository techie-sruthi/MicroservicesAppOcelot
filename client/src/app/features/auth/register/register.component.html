<p-toast></p-toast>

<div class="auth-container">
  <p-card header="Register">
    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="p-fluid">

      <div class="field">
        <label>Username  <span class="required required-asterisk">*</span></label>
        <input pInputText type="text" formControlName="userName" />
        <small class="p-error" *ngIf="registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched">
          <span *ngIf="registerForm.get('userName')?.errors?.['required']">Username is required.</span>
        </small>
      </div>

      <div class="field mt-3">
        <label>Email  <span class="required required-asterisk">*</span></label>
        <input 
          pInputText 
          type="email" 
          formControlName="email" 
          (ngModelChange)="onEmailChange($event)"
          [class.p-invalid]="(emailError && !checkingEmail) || (registerForm.get('email')?.invalid && registerForm.get('email')?.touched)" />

        <!-- Checking indicator -->
        <small *ngIf="checkingEmail" style="color: #6366f1; display: flex; align-items: center; gap: 4px; margin-top: 4px;">
          <i class="pi pi-spin pi-spinner" style="font-size: 0.8rem;"></i>
          Checking availability...
        </small>

        <!-- Email exists error -->
        <small *ngIf="emailError && !checkingEmail" class="p-error" style="display: flex; align-items: center; gap: 4px; margin-top: 4px;">
          <i class="pi pi-exclamation-triangle"></i>
          {{ emailError }}
        </small>

        <!-- Available message -->
        <small *ngIf="!emailError && !checkingEmail && registerForm.get('email')?.valid && registerForm.get('email')?.value" 
               style="color: #22c55e; display: flex; align-items: center; gap: 4px; margin-top: 4px;">
          <i class="pi pi-check"></i>
          Email is available
        </small>

        <!-- Form validation errors -->
        <small class="p-error" *ngIf="!emailError && !checkingEmail && registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="registerForm.get('email')?.errors?.['email']">Please enter a valid email.</span>
        </small>
      </div>

      <div class="field mt-3">
        <label>Password  <span class="required required-asterisk">*</span></label>
        <p-password formControlName="password" [feedback]="true" [toggleMask]="true"></p-password>
        <small class="p-error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          <span *ngIf="registerForm.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </small>
      </div>

      <div class="field mt-3">
        <label>Confirm Password <span class="required required-asterisk">*</span></label>
        <p-password formControlName="confirmPassword" [feedback]="false" [toggleMask]="true"></p-password>
        <small class="p-error" *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
          <span *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">Please confirm your password.</span>
        </small>
      </div>

      <div class="mt-4">
        <button type="submit" class="w-full" [disabled]="loading">
          {{ loading ? 'Registering...' : 'Register' }}
        </button>
      </div>

      <div class="mt-3 text-center">
        <a (click)="goToLogin()" style="cursor:pointer;">
          Already have an account? Login
        </a>
      </div>

    </form>
  </p-card>
</div>
