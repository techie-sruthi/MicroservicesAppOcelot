<p-toast class="custom-toast"></p-toast>

<div class="auth-container">
  <p-card header="Forgot Password">

    <div *ngIf="!emailSent">
      <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

      <div class="field">
        <label for="email">Email Address</label>
        <input pInputText
               id="email"
               type="email"
               [(ngModel)]="email"
               placeholder="Enter your registered email"
               [disabled]="loading"
               (keyup.enter)="onSubmit()" />
      </div>

      <p-button
              [label]="loading ? 'Sending...' : 'Send Reset Link'"
              [icon]="loading ? 'pi pi-spin pi-spinner' : 'pi pi-envelope'"
              (onClick)="onSubmit()"
              [disabled]="loading || !email"
              styleClass="w-full mt-3">
      </p-button>
    </div>

    <div *ngIf="emailSent" class="success-state">
      <div class="success-icon">
        <i class="pi pi-check-circle"></i>
      </div>
      <h3>Check Your Email</h3>
      <p>We've sent a password reset link to:</p>
      <p class="email-display">{{ email }}</p>
      <p class="hint">Didn't receive the email? Check your spam folder or try again.</p>

      <p-button
              label="Resend Email"
              icon="pi pi-refresh"
              (onClick)="emailSent = false"
              severity="secondary"
              [outlined]="true"
              styleClass="w-full mt-3">
      </p-button>
    </div>

    <div class="mt-4 text-center">
      <a routerLink="/login" class="back-link">
        <i class="pi pi-arrow-left"></i> Back to Login
      </a>
    </div>
  </p-card>
</div>
